[package]
name = "pycro_cli"
version = "0.2.0"
edition = "2024"
license = "MIT"
rust-version = "1.91"
default-run = "pycro"

[[bin]]
name = "pycro"
path = "src/main.rs"

[dependencies]
macroquad = "0.4"
rustpython-vm = "0.4"
mimalloc = "0.1"
parking_lot = "0.12"

[lints.clippy]
dbg_macro = "deny"
todo = "deny"
unwrap_used = "deny"

[lints.rust]
missing_docs = "deny"
unsafe_code = "forbid"

[profile.release]
lto = "fat"
codegen-units = 1
panic = "abort"
