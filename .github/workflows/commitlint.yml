name: commitlint

on:
  pull_request:
  push:
    branches:
      - "codex/**"
      - develop
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install commitlint
        run: npm install --no-save @commitlint/cli@19 @commitlint/config-conventional@19
      - name: Lint commits
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            from_sha="${{ github.event.pull_request.base.sha }}"
            to_sha="${{ github.event.pull_request.head.sha }}"
          else
            from_sha="${{ github.event.before }}"
            to_sha="${{ github.sha }}"
            if [[ "$from_sha" == "0000000000000000000000000000000000000000" ]]; then
              from_sha="$(git rev-list --max-parents=0 "$to_sha" | tail -n 1)"
            fi
          fi

          npx commitlint --from "$from_sha" --to "$to_sha" --verbose
